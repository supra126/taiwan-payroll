[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "taiwan-payroll"
version = "1.0.0"
description = "台灣勞健保勞退法定費用計算引擎 — Taiwan statutory payroll calculation engine"
readme = "README.md"
requires-python = ">=3.10"
license = "MIT"
dependencies = []

[project.optional-dependencies]
test = ["pytest>=8"]

[tool.hatch.build.targets.wheel]
packages = ["taiwan_payroll"]

[tool.hatch.build.targets.wheel.force-include]
"../../data" = "taiwan_payroll/data"
